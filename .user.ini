; NexAlert - .user.ini
; Dreamhost PHP-FPM reads this from the webroot (repo root).
; Changes take effect after PHP-FPM cache expires (~5 min).

; Error handling - suppress display in production, log everything
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /home/dh_w9tij7/mylogs/nexalert/php_errors.log
error_reporting = E_ALL

; Limits
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60
max_input_time = 60
memory_limit = 256M

; Session hardening
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.gc_maxlifetime = 7200

; Timezone
date.timezone = America/New_York
